<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Reservation Form</title>
</head>
<body>

    <h1>Online Reservation Form</h1>
    <p>Please fill out the details below to complete your booking.</p>

    <form action="/submit-reservation" method="POST">
        
        <!-- Contact Information Section -->
        <fieldset>
            <legend>Contact Information</legend>
            
            <p>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname">
            </p>
            
            <p>
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </p>
            
            <p>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required placeholder="123-456-7890">
            </p>
        </fieldset>

        <!-- Reservation Details Section -->
        <fieldset>
            <legend>Reservation Details</legend>
            
            <p>
                <label for="date">Reservation Date:</label>
                <input type="date" id="date" name="date" required>
            </p>
            
            <p>
                <label for="time">Preferred Time:</label>
                <input type="time" id="time" name="time" required>
            </p>
            
            <p>
                <label for="guests">Number of Guests:</label>
                <input type="number" id="guests" name="guests" min="1" max="20" default="2" required>
            </p>
            
            <p>
                <label for="room-type">Reservation Type:</label>
                <select id="room-type" name="room-type">
                    <option value="standard">Standard Dining / Seating</option>
                    <option value="vip">VIP / Private Lounge</option>
                    <option value="outdoor">Outdoor / Patio</option>
                </select>
            </p>
        </fieldset>

        <!-- Additional Preferences Section -->
        <fieldset>
            <legend>Preferences & Notes</legend>
            
            <p>Seating Preference:</p>
            <p>
                <input type="radio" id="non-smoking" name="seating" value="non-smoking" checked>
                <label for="non-smoking">Non-Smoking</label>
                <br>
                <input type="radio" id="smoking" name="seating" value="smoking">
                <label for="smoking">Smoking Area</label>
            </p>

            <p>
                <input type="checkbox" id="newsletter" name="newsletter" value="yes" checked>
                <label for="newsletter">Send me a confirmation email copy.</label>
            </p>
            
            <p>
                <label for="comments">Special Requests / Dietary Restrictions:</label>
                <br>
                <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Any special requests..."></textarea>
            </p>
        </fieldset>

        <!-- Form Actions -->
        <p>
           <a href="peta5.html"> <input type="submit" value="Submit Reservation"></a>
            <input type="reset" value="Clear Form">
        </p>

    </form>

</body>
</html>
